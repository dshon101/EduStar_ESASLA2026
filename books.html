<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduStar – School Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared.css">
  <style>
    .filter-row { display:flex; flex-wrap:wrap; gap:0.7rem; margin-bottom:2rem; align-items:center; }
    .filter-select { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.55rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; min-width:160px; }
    .filter-select:focus { border-color:rgba(255,107,43,0.5); }
    .filter-select option { background:var(--sky); }
    .book-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all 0.25s; cursor:pointer; }
    .book-card:hover { border-color:rgba(0,201,167,0.4); transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.38); }
    .book-cover { width:100%; aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; font-size:4rem; position:relative; overflow:hidden; }
    .book-spine { position:absolute; left:0; top:0; width:8px; height:100%; }
    .book-info { padding:1.1rem; }
    .book-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.92rem; margin-bottom:0.3rem; line-height:1.3; }
    .book-meta { font-size:0.73rem; color:var(--muted); line-height:1.6; }
    .book-actions { padding:0 1.1rem 1.1rem; display:flex; gap:0.5rem; }
    .book-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); z-index:200; display:flex; align-items:center; justify-content:center; padding:1.5rem; display:none; }
    .book-modal.show { display:flex; }
    .book-modal-inner { background:var(--sky); border:1px solid var(--border); border-radius:24px; padding:2rem; max-width:700px; width:100%; max-height:85vh; overflow-y:auto; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .book-modal-header { display:flex; gap:1.2rem; margin-bottom:1.5rem; }
    .book-modal-cover { width:100px; min-width:100px; aspect-ratio:3/4; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:3rem; }
    .book-modal-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; margin-bottom:0.4rem; }
    .book-modal-close { float:right; background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }
    .chapter-list { list-style:none; }
    .chapter-item { padding:0.8rem 1rem; border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:0.5rem; cursor:pointer; transition:all 0.2s; }
    .chapter-item:hover { border-color:rgba(255,107,43,0.4); background:rgba(255,107,43,0.05); }
    .chapter-item h4 { font-family:'Syne',sans-serif; font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
    .chapter-item p { font-size:0.78rem; color:var(--muted); }
    .search-box { flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; padding:0.55rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; min-width:200px; }
    .search-box:focus { border-color:rgba(255,107,43,0.5); }
    .search-box::placeholder { color:var(--muted); }
  </style>
</head>
<body>
<div class="app">

    <div class="books-grid" id="books-grid"></div>
    <div id="no-results" style="display:none;text-align:center;padding:3rem;color:var(--muted)">

    </div>
  </div>

  <footer><p>Built with ❤️ for students across Africa · <strong>EduStar AI</strong></p></footer>
</div>

let allBooks = [...BOOKS];

function init() {
  document.getElementById('nav-container').innerHTML = buildNav(student, 'books');
  // Pre-select student's country
  const countrySelect = document.getElementById('filter-country');
  countrySelect.value = student.country || '';
  filterBooks();
}

function filterBooks() {
  const search   = document.getElementById('search-input').value.toLowerCase();
  const country  = document.getElementById('filter-country').value;
  const subject  = document.getElementById('filter-subject').value;
  const grade    = document.getElementById('filter-grade').value;

  let filtered = BOOKS.filter(b => {
    if (country && b.country !== country && b.country !== 'continental') return false;
    if (subject && b.subject !== subject) return false;
    if (grade && b.gradeRange !== grade) return false;
    if (search && !b.title.toLowerCase().includes(search) && !b.subject.includes(search)) return false;
    return true;
  });

  const grid = document.getElementById('books-grid');
  const noRes = document.getElementById('no-results');

  if (filtered.length === 0) { grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';

  const FLAG = {KE:'🇰🇪',NG:'🇳🇬',ZA:'🇿🇦',TZ:'🇹🇿',UG:'🇺🇬',GH:'🇬🇭',ZW:'🇿🇼',ZM:'🇿🇲',ET:'🇪🇹',RW:'🇷🇼',continental:'🌍'};
  const GRADE_LBL = {lower_primary:'Lower Primary',upper_primary:'Upper Primary',lower_secondary:'Lower Secondary',upper_secondary:'Upper Secondary'};

  grid.innerHTML = filtered.map(b => `
    <div class="book-card" onclick="openBook('${b.id}')">
      <div class="book-cover" style="background:linear-gradient(145deg,${b.color}22,${b.color}44)">
        <div class="book-spine" style="background:${b.color}"></div>
        <span style="font-size:3.5rem">${b.icon}</span>
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-meta">
          ${FLAG[b.country]||'🌍'} ${b.country==='continental'?'Pan-African':(COUNTRY_NAMES[b.country]||b.country)}<br>
          📚 ${GRADE_LBL[b.gradeRange]||b.gradeRange} · ${b.year}<br>
          ${b.curriculum} · ${b.publisher.split('(')[0].trim()}
        </div>
      </div>
      <div class="book-actions">
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openBook('${b.id}')">📖 View Book</button>
        <button class="btn btn-sm btn-teal" onclick="event.stopPropagation();studyBook('${b.id}')">📝 Study</button>
      </div>
    </div>`).join('');
}

function openBook(id) {
  const b = BOOKS.find(x=>x.id===id);
  if (!b) return;
  const FLAG = {KE:'🇰🇪',NG:'🇳🇬',ZA:'🇿🇦',TZ:'🇹🇿',UG:'🇺🇬',GH:'🇬🇭',ZW:'🇿🇼',ZM:'🇿🇲',ET:'🇪🇹',RW:'🇷🇼',continental:'🌍'};
  const modal = document.getElementById('book-modal');
  document.getElementById('book-modal-content').innerHTML = `
    <div class="book-modal-header">
      <div class="book-modal-cover" style="background:linear-gradient(145deg,${b.color}33,${b.color}55)"><span>${b.icon}</span></div>
      <div>
        <div class="book-modal-title">${b.title}</div>
        <div style="font-size:0.82rem;color:var(--muted);line-height:1.8">
          ${FLAG[b.country]||'🌍'} ${b.country==='continental'?'Pan-African':(COUNTRY_NAMES[b.country]||b.country)}<br>
          📋 ${b.curriculum} · ${b.year}<br>
          🏛️ ${b.publisher}
        </div>
        <div style="margin-top:0.8rem;display:flex;gap:0.5rem;flex-wrap:wrap">
          <button class="btn btn-sm btn-primary" onclick="studyBook('${b.id}')">📝 Study This Book</button>
          <button class="btn btn-sm btn-teal" onclick="askTutorBook('${b.title.replace(/'/g,"\\'")}')" >🤖 Ask AI Tutor</button>
        </div>
      </div>
    </div>
    <h3 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem">📋 Table of Contents</h3>
    <ul class="chapter-list">
      ${b.chapters.map((c,i) => `
        <li class="chapter-item">
          <h4>${i+1}. ${c.ch}</h4>
          <p>${c.topics.join(' · ')}</p>
        </li>`).join('')}
    </ul>`;
  modal.classList.add('show');
}

function closeBookModal(e) {
  if (!e || e.target === document.getElementById('book-modal')) {
    document.getElementById('book-modal').classList.remove('show');
  }
}

function studyBook(id) {
  const b = BOOKS.find(x=>x.id===id);
  if (!b) return;
  document.getElementById('book-modal').classList.remove('show');
  // Map book subject to lesson page
  window.location.href = `lesson.html?subject=${b.subject}`;
}

function askTutorBook(title) {
  localStorage.setItem('edustar_pending_q', `I want to study "${title}". Can you guide me through the key topics and help me understand the important concepts?`);
  window.location.href = 'dashboard.html#chat-anchor';
}

window.addEventListener('load', init);
</script>
</body>
</html>
