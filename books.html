const FLAGS = {
  'Zimbabwe':'рџ‡їрџ‡ј','Zambia':'рџ‡їрџ‡І','Kenya':'рџ‡°рџ‡Є','Nigeria':'рџ‡ірџ‡¬',
  'South Africa':'рџ‡їрџ‡¦','Tanzania':'рџ‡№рџ‡ї','Ghana':'рџ‡¬рџ‡­','Uganda':'рџ‡єрџ‡¬','All Africa':'рџЊЌ'
};

let student = null;
let downloads = JSON.parse(localStorage.getItem('edu_book_downloads') || '{}');

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function init() {
  student = requireAuth();
  if (!student) return;
  buildNav(student);

  // Auto-set country filter from student profile
  const country = student.country || '';
  const mapped = mapCountry(country);
  if (mapped) {
    document.getElementById('filter-country').value = mapped;
    // Show hero banner
    const hero = document.getElementById('country-hero');
    document.getElementById('hero-flag').textContent = FLAGS[mapped] || 'рџЊЌ';
    document.getElementById('hero-title').textContent = `${mapped} Textbooks`;
    document.getElementById('hero-sub').textContent = `Showing free books matched to the ${mapped} curriculum`;
    hero.classList.add('show');
  }

  applyFilters();
}

function mapCountry(c) {
  if (!c) return '';
  const m = c.toUpperCase();
  if (m.includes('ZIM') || m === 'ZW') return 'Zimbabwe';
  if (m.includes('ZAM') || m === 'ZM') return 'Zambia';
  if (m.includes('KEN') || m === 'KE') return 'Kenya';
  if (m.includes('NIG') || m === 'NG') return 'Nigeria';
  if (m.includes('SOUTH') || m.includes('RSA') || m === 'ZA') return 'South Africa';
  if (m.includes('TAN') || m === 'TZ') return 'Tanzania';
  if (m.includes('GHA') || m === 'GH') return 'Ghana';
  if (m.includes('UGA') || m === 'UG') return 'Uganda';
  return '';
}

function applyFilters() {
  const q       = document.getElementById('search-input').value.toLowerCase();
  const country = document.getElementById('filter-country').value;
  const subject = document.getElementById('filter-subject').value;

  let filtered = BOOKS_DB.filter(b => {
    const matchCountry = !country || b.country === country || b.country === 'All Africa';
    const matchSubject = !subject || b.subject === subject;
    const matchSearch  = !q || b.title.toLowerCase().includes(q) || b.subject.toLowerCase().includes(q) || b.grade.toLowerCase().includes(q) || b.description.toLowerCase().includes(q);
    return matchCountry && matchSubject && matchSearch;
  });

  renderBooks(filtered);
  document.getElementById('results-count').textContent = `Showing ${filtered.length} of ${BOOKS_DB.length} books`;
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-country').value = '';
  document.getElementById('filter-subject').value = '';
  document.getElementById('country-hero').classList.remove('show');
  applyFilters();
}


function getBookCoverSVG(subject, title) {
  const colors = {
    'Mathematics': ['#FF6B2B','#F5A623'],
    'Science':     ['#00C9A7','#0088cc'],
    'Biology':     ['#2ecc71','#27ae60'],
    'English':     ['#A78BFA','#7c3aed'],
    'Commerce':    ['#F5A623','#e67e22'],
    'Technology':  ['#4FC3F7','#0288d1'],
  };
  const c = colors[subject] || ['#8A8A9A','#555'];
  const abbr = (title||subject||'?').replace(/[^A-Z0-9]/g,'').slice(0,2) || subject.slice(0,2).toUpperCase();
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
    <defs>
      <linearGradient id="bg${abbr}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c[0]}"/>
        <stop offset="100%" stop-color="${c[1]}"/>
      </linearGradient>
    </defs>
    <rect width="60" height="80" rx="6" fill="url(#bg${abbr})"/>
    <rect x="4" y="4" width="4" height="72" rx="2" fill="rgba(0,0,0,0.25)"/>
    <rect x="10" y="12" width="40" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="10" y="17" width="30" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
    <rect x="10" y="22" width="35" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
    <text x="30" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" opacity="0.95">${abbr}</text>
    <rect x="10" y="60" width="40" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
    <rect x="10" y="65" width="28" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  </svg>`;
}
function renderBooks(list) {
  const grid  = document.getElementById('books-grid');
  const empty = document.getElementById('empty-state');
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(b => {
    const dlCount = downloads[b.id] || 0;
    const isAll   = b.country === 'All Africa';
    return `<div class="book-card">
      <div class="book-card-top">
        <div class="book-icon">${getBookCoverSVG(b.subject, b.title)}</div>
        <div class="book-meta">
          <div class="book-title">${b.title}</div>
          <div class="book-badges">
            <span class="badge badge-country">${FLAGS[b.country] || 'рџЊЌ'} ${b.country}</span>
            <span class="badge badge-grade">${b.grade}</span>
            <span class="badge badge-subject">${b.subject}</span>
            <span class="badge badge-source">${b.source}</span>
          </div>
        </div>
      </div>
      <div class="book-desc">${b.description}</div>
      <div class="book-actions">
        <a class="btn btn-primary" href="${b.url}" target="_blank" onclick="trackDownload(${b.id})">
          рџ“Ґ Open / Download
        </a>
        <span style="margin-left:auto;color:var(--muted);font-size:0.78rem;align-self:center">
          ${dlCount > 0 ? 'в¬‡пёЏ ' + dlCount + ' downloads' : ''}
        </span>
      </div>
    </div>`;
  }).join('');
}

function trackDownload(id) {
  downloads[id] = (downloads[id] || 0) + 1;
  localStorage.setItem('edustar_book_downloads', JSON.stringify(downloads));
  // Also ping server to track вЂ” fixed token key to edustar_token
  const book = BOOKS_DB[id];
  fetch('/api/books.php?action=track', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':'Bearer ' + (localStorage.getItem('edustar_token')||'')},
    body: JSON.stringify({title: book.title, country: book.country, subject: book.subject, source: book.source})
  }).catch(() => {});
  toast('рџ“Ґ Opening book вЂ” enjoy studying!');
}

window.addEventListener('DOMContentLoaded', init);
</script>
